<!doctype html>
<html lang="en">
  <%- include('./layout/head', { pathPrefix: '' }); -%>

  <!-- 有些頁面的背景色是黑色 .ma-pager--dark -->
  <!-- 使用在後台頁在 body 加上 class 樣式 .ma-user -->
  <body class="ma-page ma-page--dark ma-user">
    <%- include('./layout/header', { pathPrefix: '' }); -%>
    <main class="ma-main">
      <section class="ma-section ma-message" aria-labelledby="ma-message-title">
        <div class="ma-container">
          <div class="ma-inner">
            <article
              class="ma-form-panel ma-form-panel--narrow ma-message__content"
              role="status"
              aria-live="polite"
            >
              <div
                class="ma-form-panel__body ma-form-stack ma-form-stack--loose"
              >
                <span class="ma-form-divider" aria-hidden="true"></span>

                <div class="ma-message__icon" aria-hidden="true">
                  <img
                    class="ma-message__icon-img"
                    src="/images/icon_check.png"
                    alt=""
                  />
                </div>

                <h2 id="ma-message-title" class="ma-form__title">
                  您好！感謝您耐心填寫和確認！
                </h2>

                <p class="ma-message__desc">
                  我們將與藏家確認收藏意願，請等待一個禮拜工作天，我們將主動以電話與您聯繫。
                </p>

                <span class="ma-form-divider" aria-hidden="true"></span>
              </div>
            </article>
          </div>
        </div>
      </section>
    </main>

    <%- include('./layout/footer', { pathPrefix: '' }); -%>
  </body>
</html>
